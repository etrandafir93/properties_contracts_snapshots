spring:
  cloud:
    stream:
      function:
        definition: validate|novate|persist;enrich|email
      bindings:
        validate-in-0:
          destination: incoming-trades
          content-type: application/json
        enrich-in-0:
          destination: novated-trades
          content-type: application/json
        email-out-0:
          destination: email-notifications
