spring:
  application:
    name: clearing-house-service

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  cloud:
    stream:
      function:
        # Single composed pipeline: one continuous flow
        # IncomingTrade -> validate -> novate -> persist -> enrich -> email
        definition: validate|novate|persist|enrich|email

      bindings:
        # Only input binding needed - entire pipeline is composed
        validate-in-0:
          destination: incoming-trades
          group: clearing-house
      kafka:
        binder:
          brokers: localhost:29092
          zkNodes: localhost:22181

logging:
  level:
    com.clearinghouse: DEBUG
    org.springframework.cloud.stream: DEBUG

server:
  port: 8080
