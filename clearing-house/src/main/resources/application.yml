spring:
  application:
    name: clearing-house-service

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  cloud:
    stream:
      function:
        # Composed pipeline: incoming -> (validate|novate) -> persist -> (enrich|publish)
        definition: riskAndNovate;persist;enrichAndPublish
      bindings:
        # Input: receives IncomingTrade from topic
        riskAndNovate-in-0:
          destination: incoming-trades
          group: risk-validators
        # Output of riskAndNovate: List<NovatedTrade> -> to persist
        riskAndNovate-out-0:
          destination: novated-trades
        # Input to persist: List<NovatedTrade>
        persist-in-0:
          destination: novated-trades
          group: persisters
        # Output of persist: List<NovatedTrade> -> to enrichAndPublish
        persist-out-0:
          destination: enrichment-trades
        # Input to enrichAndPublish: List<NovatedTrade>
        enrichAndPublish-in-0:
          destination: enrichment-trades
          group: enrichers
        # enrichAndPublish returns Void (terminal operation)
      kafka:
        binder:
          brokers: localhost:29092
          zkNodes: localhost:22181

logging:
  level:
    com.clearinghouse: DEBUG
    org.springframework.cloud.stream: DEBUG

server:
  port: 8080
